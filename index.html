<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Điểm Danh QR - Siêu Tốc (WebAssembly)</title>
    <!-- Tải thư viện Nimiq QR Scanner (nhanh nhất cho web hiện tại) -->
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        
        /* Chỉnh lại khung video */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        /* Tạo khung ngắm (Scanner Box) cho chuyên nghiệp */
        .scan-region-highlight {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60%;
            border: 3px solid rgba(16, 185, 129, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4); /* Làm tối xung quanh */
            pointer-events: none;
        }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; flex: 1;
        }
        button.danger { background-color: #ef4444; }
        button.success { background-color: #10b981; }
        .alert {
            padding: 12px; background-color: #d1fae5; color: #065f46;
            border-radius: 6px; margin-bottom: 20px; text-align: center;
            font-weight: bold; display: none;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f3f4f6; }
        .empty-state { text-align: center; padding: 20px; color: #6b7280; }
    </style>
</head>
<body>

<div class="container">
    <h2>Điểm Danh Siêu Tốc</h2>
    
    <div class="video-wrapper">
        <video id="qr-video"></video>
        <div class="scan-region-highlight"></div>
    </div>

    <div id="success-alert" class="alert"></div>

    <div class="controls">
        <button class="success" onclick="exportCSV()">Tải file Excel</button>
        <button class="danger" onclick="clearData()">Xóa dữ liệu</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thông tin Học sinh</th>
                    <th>Thời gian quét</th>
                </tr>
            </thead>
            <tbody id="attendance-list"></tbody>
        </table>
        <div id="empty-state" class="empty-state">Chưa có dữ liệu điểm danh.</div>
    </div>
</div>

<script>
    let attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || [];
    let lastScannedText = ""; 
    let scanTimeout;
    const video = document.getElementById('qr-video');

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // Tần số cao hơn chút cho rõ
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 100); // Kêu ngắn hơn để quét nhanh
    }

    function showAlert(message) {
        const alertBox = document.getElementById('success-alert');
        alertBox.textContent = message;
        alertBox.style.display = 'block';
        clearTimeout(scanTimeout);
        scanTimeout = setTimeout(() => { alertBox.style.display = 'none'; }, 2500);
    }

    function renderTable() {
        const tbody = document.getElementById('attendance-list');
        const emptyState = document.getElementById('empty-state');
        tbody.innerHTML = '';
        if (attendanceData.length === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';
            attendanceData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${attendanceData.length - index}</td><td><strong>${item.info}</strong></td><td>${item.time}</td>`;
                tbody.appendChild(tr);
            });
        }
    }

    // Xử lý khi quét thành công
    function onScanSuccess(result) {
        const decodedText = result.data;
        if (decodedText === lastScannedText) return; 
        
        lastScannedText = decodedText;
        setTimeout(() => lastScannedText = "", 3000); // Khóa 3s để chống quét lặp

        playBeep();
        
        const now = new Date();
        const timeString = now.toLocaleTimeString('vi-VN') + ' - ' + now.toLocaleDateString('vi-VN');
        const isExist = attendanceData.some(record => record.info === decodedText);
        
        if(isExist) {
            showAlert(`⚠️ ${decodedText} đã điểm danh!`);
        } else {
            attendanceData.unshift({ info: decodedText, time: timeString });
            localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
            showAlert(`✅ Ghi nhận: ${decodedText}`);
            renderTable();
        }
    }

    // KHỞI TẠO MÁY QUÉT WEBASSEMBLY (SIÊU TỐC)
    const qrScanner = new QrScanner(
        video,
        result => onScanSuccess(result),
        {
            highlightScanRegion: true,
            highlightCodeOutline: true, // Vẽ viền xanh quanh mã QR khi bắt được
            preferredCamera: 'environment', // Mặc định dùng camera sau
            maxScansPerSecond: 15, // Tốc độ bắt ảnh rất cao
            returnDetailedScanResult: true,
        }
    );

    // Bắt đầu chạy camera
    qrScanner.start().catch(e => console.error("Lỗi khởi động camera: ", e));

    function exportCSV() {
        if (attendanceData.length === 0) return alert("Không có dữ liệu!");
        let csvContent = "\uFEFFSTT,Thông tin Học sinh,Thời gian quét\n";
        attendanceData.forEach((row, index) => {
            const info = `"${row.info.replace(/"/g, '""')}"`;
            csvContent += `${attendanceData.length - index},${info},${row.time}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `DiemDanh_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearData() {
        if (confirm("Xóa toàn bộ dữ liệu điểm danh hiện tại?")) {
            attendanceData = [];
            localStorage.removeItem('attendanceData');
            renderTable();
        }
    }

    renderTable();
</script>

</body>
</html>
