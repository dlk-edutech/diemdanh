<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Điểm Danh Bằng QR Code (Bản Tối Ưu)</title>
    <!-- Tải thư viện quét QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: space-between;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button.danger {
            background-color: #ef4444;
        }
        button.success {
            background-color: #10b981;
        }
        .alert {
            padding: 12px;
            background-color: #d1fae5;
            color: #065f46;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: #f3f4f6;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Điểm Danh Lớp Học</h2>
    
    <!-- Khu vực camera quét QR -->
    <div id="reader"></div>

    <!-- Thông báo quét thành công -->
    <div id="success-alert" class="alert"></div>

    <!-- Nút điều khiển -->
    <div class="controls">
        <button class="success" onclick="exportCSV()">Tải file Excel (CSV)</button>
        <button class="danger" onclick="clearData()">Xóa dữ liệu</button>
    </div>

    <!-- Danh sách học sinh đã quét -->
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thông tin Học sinh</th>
                    <th>Thời gian quét</th>
                </tr>
            </thead>
            <tbody id="attendance-list">
                <!-- Dữ liệu sẽ được render ở đây -->
            </tbody>
        </table>
        <div id="empty-state" class="empty-state">Chưa có dữ liệu điểm danh.</div>
    </div>
</div>

<script>
    // Khởi tạo mảng lưu trữ từ LocalStorage
    let attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || [];
    let lastScannedText = ""; // Biến chống quét lặp lại liên tục 1 mã
    let scanTimeout;

    // Hàm tạo âm thanh Beep khi quét thành công
    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Âm cao
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 150);
    }

    // Hiển thị thông báo trên màn hình
    function showAlert(message) {
        const alertBox = document.getElementById('success-alert');
        alertBox.textContent = message;
        alertBox.style.display = 'block';
        clearTimeout(scanTimeout);
        scanTimeout = setTimeout(() => {
            alertBox.style.display = 'none';
        }, 3000);
    }

    // Render danh sách ra bảng
    function renderTable() {
        const tbody = document.getElementById('attendance-list');
        const emptyState = document.getElementById('empty-state');
        tbody.innerHTML = '';
        
        if (attendanceData.length === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';
            attendanceData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${attendanceData.length - index}</td>
                    <td><strong>${item.info}</strong></td>
                    <td>${item.time}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    // Xử lý khi quét QR thành công
    function onScanSuccess(decodedText, decodedResult) {
        // Chống quét trùng lặp 1 mã liên tục trong 5 giây
        if (decodedText === lastScannedText) return; 
        
        lastScannedText = decodedText;
        setTimeout(() => lastScannedText = "", 5000); // Sau 5s mới cho quét lại mã này

        playBeep();
        
        const now = new Date();
        const timeString = now.toLocaleTimeString('vi-VN') + ' - ' + now.toLocaleDateString('vi-VN');

        // Kiểm tra xem hs này đã điểm danh chưa
        const isExist = attendanceData.some(record => record.info === decodedText);
        
        if(isExist) {
            showAlert(`⚠️ Học sinh [${decodedText}] đã được điểm danh trước đó!`);
        } else {
            // Thêm vào đầu mảng
            attendanceData.unshift({
                info: decodedText,
                time: timeString
            });
            // Lưu vào bộ nhớ trình duyệt
            localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
            showAlert(`✅ Đã ghi nhận: ${decodedText}`);
            renderTable();
        }
    }

    // Cấu hình máy quét QR (Bản Tối Ưu Độ Phân Giải & Lấy Nét)
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            videoConstraints: {
                facingMode: "environment", 
                width: { min: 1280, ideal: 1920, max: 2560 }, 
                height: { min: 720, ideal: 1080, max: 1440 },
                advanced: [{ focusMode: "continuous" }] 
            }
        }, 
        /* verbose= */ false
    );
    html5QrcodeScanner.render(onScanSuccess);

    // Xuất dữ liệu ra file CSV
    function exportCSV() {
        if (attendanceData.length === 0) {
            alert("Không có dữ liệu để xuất!");
            return;
        }
        
        // Thêm BOM để Excel đọc được tiếng Việt (UTF-8)
        let csvContent = "\uFEFFSTT,Thông tin Học sinh,Thời gian quét\n";
        
        attendanceData.forEach((row, index) => {
            // Escape dấu phẩy trong nội dung nếu có
            const info = `"${row.info.replace(/"/g, '""')}"`;
            csvContent += `${attendanceData.length - index},${info},${row.time}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `DiemDanh_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Xóa toàn bộ dữ liệu
    function clearData() {
        if (confirm("Bạn có chắc chắn muốn xóa toàn bộ dữ liệu điểm danh hiện tại? Hành động này không thể hoàn tác.")) {
            attendanceData = [];
            localStorage.removeItem('attendanceData');
            renderTable();
            alert("Đã xóa dữ liệu!");
        }
    }

    // Chạy render bảng lần đầu khi mở app
    renderTable();
</script>

</body>
</html>
